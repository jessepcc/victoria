name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: Build (production)
        run: go build ./...

      - name: Build (dev tag)
        run: go build -tags dev ./...

      - name: Vet
        run: |
          go vet ./...
          go vet -tags dev ./...

      - name: Test
        env:
          VICTORIA_WHATSAPP_DISABLED: "1"
        run: go test -race ./...

  integration:
    name: Postgres integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: victoria_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Integration tests
        env:
          VICTORIA_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/victoria_test?sslmode=disable
        # The store self-migrates on Connect(), so no separate migration step.
        run: go test -count=1 ./internal/store/postgres

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        # action v7+ is required to drive golangci-lint v2 (see .golangci.yml).
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Module-level scan: still flags known-vulnerable dependency versions,
          # but skips the source/SSA callgraph analysis that currently panics on
          # Go 1.26 generics (golang.org/x/tools ForEachElement / TypeParam).
          govulncheck -scan module ./...
