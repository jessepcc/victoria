name: Bug report
description: Report a defect in Victoria
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please do **not** report security issues here —
        see [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the actual vs. expected behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps. Include the request(s) made and any relevant config.
      placeholder: |
        1. Start with `VICTORIA_GATEWAY_INBOUND_TOKEN=... go run ./cmd/victoria`
        2. POST /cases with ...
        3. Observe ...
    validations:
      required: true
  - type: dropdown
    id: store
    attributes:
      label: Store backend
      options:
        - in-memory (default)
        - postgres
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD` or the release tag.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output. Redact any secrets or customer data.
      render: shell
